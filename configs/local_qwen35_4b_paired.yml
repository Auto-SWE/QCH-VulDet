---
model_name: Qwen/Qwen3.5-4B
dataset_name: lukasjordan/qch-vuldet
dataset_config: paired

train_split: train
eval_split: validation
test_split: test

output_dir: local_outputs/qwen35_4b_paired

max_length: 1024
train_subset: 12000
eval_subset: 2000

num_train_epochs: 1
learning_rate: 0.0001
lr_scheduler_type: cosine
weight_decay: 0.01
warmup_ratio: 0.03
max_grad_norm: 0.3
optim: paged_adamw_8bit

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
eval_accumulation_steps: 16

use_qlora: true
bf16: false
fp16: true
gradient_checkpointing: true

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

class_weighting: none
metric_for_best_model: pr_auc

logging_steps: 10
eval_steps: 100
save_steps: 100
save_total_limit: 2
seed: 42

wandb:
  enabled: true
  entity: automating-swe
  project: qch-vuldet
  tags:
    - local
    - qwen35
    - 4b
    - paired
    - qlora
