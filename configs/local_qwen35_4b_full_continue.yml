---
model_name: Qwen/Qwen3.5-4B
dataset_name: lukasjordan/qch-vuldet
dataset_config: default

train_split: train
eval_split: validation
test_split: test

output_dir: local_outputs/qwen35_4b_full_continue

# Continue from the paired-stage adapter.
resume_adapter_dir: local_outputs/qwen35_4b_paired

max_length: 1024
train_subset: 30000
eval_subset: 4000

num_train_epochs: 1
learning_rate: 0.00005
lr_scheduler_type: cosine
weight_decay: 0.01
warmup_ratio: 0.03
max_grad_norm: 0.3
optim: paged_adamw_8bit

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
eval_accumulation_steps: 16

use_qlora: true
bf16: false
fp16: true
gradient_checkpointing: true

# Used only when training from the base model. When resume_adapter_dir is set,
# PEFT loads the adapter config from that directory.
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

class_weighting: auto
metric_for_best_model: pr_auc

logging_steps: 10
eval_steps: 150
save_steps: 150
save_total_limit: 2
seed: 42

wandb:
  enabled: true
  entity: automating-swe
  project: qch-vuldet
  tags:
    - local
    - qwen35
    - 4b
    - full
    - continue
    - qlora
